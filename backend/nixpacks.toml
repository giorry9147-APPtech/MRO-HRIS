providers = ["php"]

[phases.install]
cmds = ["composer install --ignore-platform-reqs --no-interaction --prefer-dist --optimize-autoloader"]

[start]
cmd = "bash -lc 'php artisan config:clear; php artisan route:clear; php artisan view:clear; php artisan migrate --force; php artisan storage:link || true; php artisan serve --host=0.0.0.0 --port=${PORT:-8080}'"